<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="manifest.json">
    <title>إدارة نادي الرجاء العراقي</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden pb-16">
    <div id="passcode-screen" class="fixed inset-0 bg-slate-900 z-[100] flex flex-col items-center justify-center p-4">
        <div class="mb-8 p-1 bg-white/10 rounded-full shadow-2xl">
            <img src="./icon-512.png" alt="شعار النادي" class="w-32 h-32 object-cover rounded-full shadow-lg" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSJjdXJyZW50Q29sb3IiIHN0cm9rZS13aWR0aD0iMiI+PGNpcmNsZSBjeD0iMTIiIGN5PSIxMiIgcj0iMTAiLz48cGF0aCBkPSJNMTIgOGgudDAxIi8+PHBhdGggZD0iTTEyIDEyYTIgMiAwIDAgMSAyejEiLz48L3N2Zz4='">
        </div>
        <h2 class="text-white text-2xl font-bold mb-6">الرجاء إدخال الرمز</h2>
        <div class="w-full max-w-xs">
            <input type="password" id="admin-passcode" class="w-full bg-slate-800 border-2 border-slate-700 text-white text-center text-3xl font-mono tracking-[0.5em] rounded-xl p-4 focus:outline-none focus:border-indigo-500 transition-colors" placeholder="••••" maxlength="4" autocomplete="off" inputmode="numeric">
            <p id="passcode-error" class="text-rose-500 text-center mt-3 text-sm hidden font-bold">الرمز غير صحيح</p>
        </div>
    </div>

    <div id="admin-app" class="flex flex-col min-h-screen relative max-w-md mx-auto bg-white shadow-xl hidden">
        <header class="bg-white border-b border-slate-200 p-4 sticky top-0 z-10 shadow-sm flex items-center justify-center">
            <h2 class="text-xl font-bold text-slate-800">إدارة النادي</h2>
        </header>

        <main class="flex-1 p-4 overflow-y-auto w-full">
            <section id="section-dashboard" class="block">
                <h1 class="text-xl font-bold mb-4">الرئيسية</h1>
                <div class="grid grid-cols-1 gap-4 mb-6">
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between">
                        <div>
                            <h3 class="text-slate-500 text-sm font-medium">إجمالي اللاعبين</h3>
                            <p class="text-3xl font-bold mt-2" id="stat-players">0</p>
                        </div>
                        <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-lg flex items-center justify-center">
                            <i data-lucide="users"></i>
                        </div>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between">
                        <div>
                            <h3 class="text-slate-500 text-sm font-medium">المشجعين المسجلين</h3>
                            <p class="text-3xl font-bold mt-2" id="stat-fans">0</p>
                        </div>
                        <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center">
                            <i data-lucide="star"></i>
                        </div>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex items-center justify-between">
                        <div>
                            <h3 class="text-slate-500 text-sm font-medium">الأخبار</h3>
                            <p class="text-3xl font-bold mt-2" id="stat-news">0</p>
                        </div>
                        <div class="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-lg flex items-center justify-center">
                            <i data-lucide="newspaper"></i>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-4 mb-20">
                    <h2 class="text-lg font-bold mb-4">أحدث المشجعين</h2>
                    <div id="fans-list" class="space-y-3"></div>
                </div>
            </section>

            <section id="section-players" class="hidden pb-20">
                <div class="flex flex-col gap-3 mb-6">
                    <h1 class="text-xl font-bold">إدارة اللاعبين</h1>
                    <button onclick="toggleForm('player-form')" class="bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center justify-center gap-2 hover:bg-blue-700 w-full">
                        <i data-lucide="plus" class="w-4 h-4"></i> إضافة لاعب
                    </button>
                </div>

                <div id="player-form" class="hidden bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm mb-6">
                    <div class="grid grid-cols-1 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">الاسم</label>
                            <input type="text" id="p-name" class="w-full border border-slate-300 rounded-md p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">العمر</label>
                            <input type="number" id="p-age" class="w-full border border-slate-300 rounded-md p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">المركز</label>
                            <input type="text" id="p-pos" placeholder="مثال: مهاجم" class="w-full border border-slate-300 rounded-md p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">الحالة</label>
                            <select id="p-status" class="w-full border border-slate-300 rounded-md p-2 bg-white">
                                <option value="أساسي">أساسي</option>
                                <option value="احتياطي">احتياطي</option>
                                <option value="مصاب">مصاب</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">صورة (رفع إلى ImageKit)</label>
                            <input type="file" id="p-photo-file" accept="image/*" class="w-full border border-slate-300 rounded-md p-2 bg-white">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">كود الدخول</label>
                            <div class="flex gap-2">
                                <input type="text" id="p-code" class="flex-1 border border-slate-300 rounded-md p-2 bg-white" readonly dir="ltr">
                                <button onclick="generateCode()" class="bg-slate-200 px-3 rounded-md hover:bg-slate-300 whitespace-nowrap">توليد</button>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4 flex flex-col gap-2">
                        <button id="btn-save-player" onclick="savePlayer()" class="w-full px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">حفظ</button>
                        <button onclick="toggleForm('player-form')" class="w-full px-4 py-2 text-slate-600 border border-slate-200 rounded-md hover:bg-slate-100">إلغاء</button>
                    </div>
                </div>

                <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden overflow-x-auto">
                    <table class="w-full text-right text-sm min-w-[300px]">
                        <thead class="bg-slate-50 text-slate-500 border-b border-slate-200">
                            <tr>
                                <th class="p-3 font-medium">اللاعب</th>
                                <th class="p-3 font-medium text-left" dir="ltr">الكود</th>
                                <th class="p-3 font-medium text-center">إجراء</th>
                            </tr>
                        </thead>
                        <tbody id="players-table" class="divide-y divide-slate-100 text-slate-700">
                            </tbody>
                    </table>
                </div>
            </section>

            <section id="section-news" class="hidden pb-20">
                 <div class="flex flex-col gap-3 mb-6">
                    <h1 class="text-xl font-bold">إدارة الأخبار</h1>
                    <button onclick="toggleForm('news-form')" class="bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center justify-center gap-2 hover:bg-blue-700 w-full">
                        <i data-lucide="plus" class="w-4 h-4"></i> إضافة خبر
                    </button>
                </div>

                <div id="news-form" class="hidden bg-slate-50 p-4 rounded-xl border border-slate-200 shadow-sm mb-6">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">عنوان الخبر</label>
                            <input type="text" id="n-title" class="w-full border border-slate-300 rounded-md p-2">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">التفاصيل</label>
                            <textarea id="n-content" class="w-full border border-slate-300 rounded-md p-2 h-24"></textarea>
                        </div>
                    </div>
                    <div class="mt-4 flex flex-col gap-2">
                        <button onclick="saveNews()" class="w-full px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">نشر الخبر</button>
                        <button onclick="toggleForm('news-form')" class="w-full px-4 py-2 text-slate-600 border border-slate-200 rounded-md hover:bg-slate-100">إلغاء</button>
                    </div>
                </div>

                <div id="news-list" class="space-y-4">
                    </div>
            </section>
        </main>
        
        <nav class="fixed bottom-0 w-full max-w-md bg-white border-t border-slate-200 h-16 flex items-center justify-around z-20 pb-safe shadow-[0_-4px_6px_-1px_rgb(0,0,0,0.05)]">
            <button onclick="showSection('dashboard')" class="flex flex-col items-center justify-center w-full h-full gap-1 nav-link text-blue-600 transition-colors" id="nav-dashboard">
                <i data-lucide="home" class="w-6 h-6 nav-icon"></i>
                <span class="text-[10px] font-medium">الرئيسية</span>
            </button>
            <button onclick="showSection('players')" class="flex flex-col items-center justify-center w-full h-full gap-1 nav-link text-slate-500 hover:text-slate-900 transition-colors" id="nav-players">
                <i data-lucide="users" class="w-6 h-6 nav-icon"></i>
                <span class="text-[10px] font-medium">اللاعبين</span>
            </button>
            <button onclick="showSection('news')" class="flex flex-col items-center justify-center w-full h-full gap-1 nav-link text-slate-500 hover:text-slate-900 transition-colors" id="nav-news">
                <i data-lucide="newspaper" class="w-6 h-6 nav-icon"></i>
                <span class="text-[10px] font-medium">الأخبار</span>
            </button>
        </nav>
    </div>
    
    <script type="module" src="script.js"></script>
    <script>
      lucide.createIcons();

      // Passcode Logic
      const passcodeScreen = document.getElementById('passcode-screen');
      const adminApp = document.getElementById('admin-app');
      const passcodeInput = document.getElementById('admin-passcode');
      const passcodeError = document.getElementById('passcode-error');

      if (localStorage.getItem('admin_authenticated') === 'true') {
          passcodeScreen.classList.add('hidden');
          adminApp.classList.remove('hidden');
      } else {
          passcodeInput.addEventListener('input', (e) => {
              if (e.target.value.length === 4) {
                  if (e.target.value === '3685') {
                      localStorage.setItem('admin_authenticated', 'true');
                      passcodeScreen.classList.add('hidden');
                      adminApp.classList.remove('hidden');
                  } else {
                      passcodeError.classList.remove('hidden');
                      e.target.value = '';
                      passcodeInput.classList.add('animate-pulse');
                      setTimeout(() => passcodeInput.classList.remove('animate-pulse'), 500);
                  }
              } else {
                  passcodeError.classList.add('hidden');
              }
          });
      }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }

        let deferredPrompt;
        const installPrompt = document.createElement('div');
        installPrompt.innerHTML = `
        <div id="admin-install-prompt" class="fixed inset-0 bg-slate-900/80 z-[200] flex items-end sm:items-center justify-center p-4 transition-opacity">
            <div class="bg-white rounded-t-2xl sm:rounded-2xl w-full max-w-sm p-6 flex flex-col items-center text-center animate-slide-up transform transition-transform">
                <img src="./icon-512.png" alt="شعار النادي" class="w-24 h-24 mb-4 object-cover rounded-full shadow-md border-2 border-slate-100" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSJjdXJyZW50Q29sb3IiIHN0cm9rZS13aWR0aD0iMiI+PGNpcmNsZSBjeD0iMTIiIGN5PSIxMiIgcj0iMTAiLz48cGF0aCBkPSJNMTIgOGgudDAxIi8+PHBhdGggZD0iTTEyIDEyYTIgMiAwIDAgMSAyejEiLz48L3N2Zz4='">
                <h3 class="text-xl font-bold mb-2 text-slate-900">تثبيت تطبيق الإدارة</h3>
                <p class="text-slate-500 text-sm mb-6">قم بتثبيت تطبيق إدارة النادي للوصول السريع والإدارة المستمرة.</p>
                <div class="flex flex-col w-full gap-3">
                    <button id="admin-btn-install" class="w-full bg-indigo-600 text-white rounded-xl py-3 font-bold shadow-md shadow-indigo-500/20 active:bg-indigo-700 transition">تثبيت الآن</button>
                    <button id="admin-btn-skip-install" class="w-full bg-slate-100 text-slate-600 rounded-xl py-3 font-medium active:bg-slate-200 transition">تخطي</button>
                </div>
            </div>
        </div>
        `;
        
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            if(!localStorage.getItem('admin_pwa_install_skipped')) {
                document.body.appendChild(installPrompt);
                
                document.getElementById('admin-btn-install').addEventListener('click', async () => {
                    if (deferredPrompt) {
                        deferredPrompt.prompt();
                        const { outcome } = await deferredPrompt.userChoice;
                        deferredPrompt = null;
                        installPrompt.remove();
                    }
                });

                document.getElementById('admin-btn-skip-install').addEventListener('click', () => {
                    installPrompt.remove();
                    localStorage.setItem('admin_pwa_install_skipped', 'true');
                });
            }
        });

        window.addEventListener('appinstalled', () => {
             if(document.getElementById('admin-install-prompt')) installPrompt.remove();
             deferredPrompt = null;
        });
    </script>
</body>
</html>
